<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Фракции Апокалипсиса</title>
  <!-- SDK Owlbear Rodeo теперь подключается прямо внутри script.js через import,
       поэтому отдельный <script> тег для него здесь больше не нужен. -->
  <!-- Подключаем твой файл стилей -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="tabs">
    <button id="tab-players" class="tab-btn active">👥 Все фракции</button>
    <button id="tab-gm" class="tab-btn gm-only" >🛠 Добавить фракцию</button>
  </div>

  <!-- ВКЛАДКА ИГРОКОВ: ВСЕ ФРАКЦИИ -->
  <div id="content-players" class="tab-content active">
    <h2>Все фракции</h2>
    <div id="fractions-list" class="fractions-container">
      <p class="empty-msg">Фракций пока нет...</p>
    </div>
  </div>

  <!-- ВКЛАДКА ГМ: УПРАВЛЕНИЕ -->
  <div id="content-gm" class="tab-content">
    <div class="gm-panel">
      <h2 id="gm-form-title">Добавить фракцию</h2>

      <!-- Скрытое поле для ID редактируемой фракции -->
      <input type="hidden" id="fac-id" />

      <label>Название:</label>
      <input type="text" id="fac-name" placeholder="Например: Выжившие" />

      <label>Фото (Эмодзи-иконка):</label>
      <input type="text" id="fac-icon" placeholder="Например: 🛡 или ☠" />

      <label>Цвет фракции:</label>
      <input type="color" id="fac-color" value="#8b0000" />

      <label>Количество людей в фракции:</label>
      <input type="number" id="fac-count" placeholder="Например: 120" />

      <label>Игроки (выберите из списка):</label>
      <select id="fac-players" multiple title="Зажмите Ctrl чтобы выбрать нескольких">
        <!-- Игроки подгрузятся автоматически -->
      </select>
      <small style="color: #aaa; display: block; margin-bottom: 10px;">
        Зажмите Ctrl/Cmd для выбора нескольких игроков
      </small>

      <button id="save-fac-btn">Сохранить фракцию</button>
      <button id="cancel-edit-btn" style="display: none; background: #555; margin-top: 5px;">
        Отмена редактирования
      </button>
    </div>
  </div>

  <!-- Подключаем твой файл скриптов как ES-модуль (важно: type="module") -->
  <script type="module" src="script.js?v=4"></script>
</body>
</html>
